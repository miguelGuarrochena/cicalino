<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cicalino — sin conexión</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 20px; padding: 24px; text-align: center;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #f4f1da; color: #20264f;
      }
      @media (prefers-color-scheme: dark) { body { background: #10142f; color: #ede9ce; } }
      .badge {
        width: 88px; height: 88px; border-radius: 24px; background: #2536d4;
        display: flex; align-items: center; justify-content: center;
      }
      h1 { font-size: 22px; margin: 0; text-transform: uppercase; letter-spacing: -0.02em; }
      p { margin: 0; opacity: 0.7; max-width: 28rem; }
      button {
        margin-top: 8px; border: none; border-radius: 999px; cursor: pointer;
        background: #2536d4; color: #f4f1da; font-weight: 600; font-size: 15px;
        padding: 12px 24px; font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div class="badge">
      <svg width="48" height="48" viewBox="0 0 512 512" fill="#f4f1da" aria-hidden="true">
        <circle cx="256" cy="118" r="22" />
        <path d="M256 134 C184 134 150 196 150 264 C150 336 132 356 106 384 C95 396 104 414 120 414 L392 414 C408 414 417 396 406 384 C380 356 362 336 362 264 C362 196 328 134 256 134 Z" />
        <path d="M304 436 a48 44 0 0 1 -96 0 z" />
      </svg>
    </div>
    <h1>Sin conexión</h1>
    <p>No pudimos cargar la página. Revisá tu conexión y volvé a intentar.</p>
    <button onclick="location.reload()">Reintentar</button>
  </body>
</html>
